appId: com.dottortime.app
productName: DottorTime
# Non pubblicare mai automaticamente una GitHub Release: il workflow CI
# produce solo artifact scaricabili dalla pagina della run (vedi
# .github/workflows/build.yml). Senza questa riga, electron-builder tenta la
# pubblicazione in automatico quando rileva GH_TOKEN + una build su tag,
# fallendo con 403 perché il GITHUB_TOKEN di default non ha i permessi per
# creare release.
publish: never
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
  - '!**/*.map'
asarUnpack:
  - '**/*.node'
win:
  icon: build/icon.png
  target:
    - target: nsis
      arch: [x64]
mac:
  icon: build/icon.png
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.medical
linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch: [x64]
  category: Office
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
