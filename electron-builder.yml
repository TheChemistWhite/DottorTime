appId: com.dottortime.app
productName: DottorTime
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
  - '!**/*.map'
asarUnpack:
  - '**/*.node'
win:
  icon: build/icon.png
  target:
    - target: nsis
      arch: [x64]
mac:
  icon: build/icon.png
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.medical
linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch: [x64]
  category: Office
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
