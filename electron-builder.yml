appId: com.dottortime.app
productName: DottorTime
# NOTA sulla pubblicazione: niente publish/GitHub release automatiche, il
# workflow CI produce solo artifact scaricabili dalla run (vedi
# .github/workflows/build.yml). Questo NON va impostato qui come
# `publish: never` nella config: in electron-builder 24.13.3 quella stringa,
# combinata con GH_TOKEN presente durante una build su tag, va in crash
# ("Cannot find module 'electron-publisher-never'") nella risoluzione della
# config di auto-update. La disattivazione va invece fatta passando
# `--publish=never` come flag da riga di comando (vedi script "dist:*" in
# package.json), che segue un percorso di codice diverso e funziona.
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
  - '!**/*.map'
asarUnpack:
  - '**/*.node'
win:
  icon: build/icon.png
  target:
    - target: nsis
      arch: [x64]
mac:
  icon: build/icon.png
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.medical
linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch: [x64]
  category: Office
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
